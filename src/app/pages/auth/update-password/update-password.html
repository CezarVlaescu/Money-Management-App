<main class="auth-page">
  <section class="auth-card">
    <div class="auth-card__header">
      <span class="auth-card__eyebrow">Money Bloom</span>
      <h1>Create new password</h1>
      <p>Choose a new password for your Money Bloom account.</p>
    </div>

    <form class="auth-form" [formGroup]="form" (ngSubmit)="submit()">
      <label class="auth-form__field">
        <span>New password</span>
        <input type="password" formControlName="password" placeholder="Minimum 8 characters" />
      </label>

      @if (form.controls.password.touched && form.controls.password.invalid) {
        <small class="auth-form__error">Password must have at least 8 characters.</small>
      }

      @if (error()) {
        <p class="auth-form__server-error">{{ error() }}</p>
      }

      <button class="auth-form__submit" type="submit" [disabled]="loading()">
        {{ loading() ? 'Updating...' : 'Update password' }}
      </button>
    </form>

    <div class="auth-card__links">
      <a routerLink="/auth/login">Back to login</a>
    </div>
  </section>
</main>
