<app-dashboard-hero />
<app-income-card />
<section class="dashboard-budget-list">
  @for (bucket of budgetService.budgetBuckets(); track bucket.category) {
    <app-budget-card [budgetBucket]="bucket" />
  }
</section>
<app-budget-overview />
<app-smart-insights
  [insights]="moneyInsights()"
  [loading]="loadingMoneyInsights()"
  (refreshRequested)="loadMoneyInsights()"
/>

@if (moneyInsightsError()) {
  <div class="dashboard__insights-error">
    <span>Smart insights are temporarily unavailable.</span>

    <button type="button" (click)="loadMoneyInsights()">Try again</button>
  </div>
}
<app-recent-expenses />
