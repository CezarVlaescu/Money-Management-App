<app-page-header
  eyebrow="Expenses"
  title="Track your spending"
  description="Add your transactions and Money Bloom will place them into the right budget."
/>

<section class="expenses-summary">
  <p>Total spent</p>

  <strong>
    {{ moneyFormatter.format(expensesService.totalSpent()) }}
  </strong>

  <span>
    Based on {{ expensesService.expenses().length }} transactions
  </span>
</section>

<app-add-expense-card (expenseAdded)="onExpenseAdded()" />

<section class="expense-filters">
  @for (filter of expensesFilters; track filter.value) {
    <button
      type="button"
      class="expense-filters__item"
      [class.expense-filters__item--active]="selectedCategory() === filter.value"
      (click)="selectCategory(filter.value)"
    >
      <span>{{ filter.icon }}</span>
      {{ filter.label }}
    </button>
  }
</section>

<section class="expenses-list">
  @if (filteredExpenses().length > 0) {
    @for (expense of filteredExpenses(); track expense.id) {
      <app-expense-item
        [expense]="expense"
        (deleteExpense)="deleteExpense($event)"
      />
    }
  } @else {
    <app-empty-state
      icon="🌿"
      title="No transactions yet"
      description="Start by adding your first expense. Money Bloom will automatically place it into Needs, Wants or Savings."
      actionLabel="Add transaction"
      (actionClicked)="openAddTransaction()"
    />
  }
</section>
