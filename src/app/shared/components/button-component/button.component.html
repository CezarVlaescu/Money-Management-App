<button
[style.background]="buttonConfig().buttonColor"
[style.border]="buttonConfig().buttonBorder"
(click)="buttonConfig().buttonAction()"
>
    @if(buttonConfig().buttonIcon) {
        <app-icon [iconComponentConfig]="iconConfig" />
    }
    <span class="primary-heading-4">
        {{buttonConfig().buttonText}}
    </span>
</button>
