<nav class="bottom-navigation" aria-label="Main navigation">
  <a
    class="bottom-navigation__item"
    routerLink="/dashboard"
    routerLinkActive="bottom-navigation__item--active"
    [routerLinkActiveOptions]="{ exact: true }"
  >
    <span class="bottom-navigation__icon">🏠</span>
    <span class="bottom-navigation__label">Home</span>
  </a>

  <a
    class="bottom-navigation__item"
    routerLink="/expenses"
    routerLinkActive="bottom-navigation__item--active"
    [routerLinkActiveOptions]="{ exact: true }"
  >
    <span class="bottom-navigation__icon">📊</span>
    <span class="bottom-navigation__label">Expenses</span>
  </a>

  <a
    class="bottom-navigation__item"
    routerLink="/calendar"
    routerLinkActive="bottom-navigation__item--active"
    [routerLinkActiveOptions]="{ exact: true }"
  >
    <span class="bottom-navigation__icon">📅</span>
    <span class="bottom-navigation__label">Calendar</span>
  </a>

  <a
    class="bottom-navigation__item"
    routerLink="/savings-goals"
    routerLinkActive="bottom-navigation__item--active"
    [routerLinkActiveOptions]="{ exact: true }"
  >
    <span class="bottom-navigation__icon">🎯</span>
    <span class="bottom-navigation__label">Goals</span>
  </a>

  <a
    class="bottom-navigation__item"
    routerLink="/settings"
    routerLinkActive="bottom-navigation__item--active"
    [routerLinkActiveOptions]="{ exact: true }"
  >
    <span class="bottom-navigation__icon">⚙️</span>
    <span class="bottom-navigation__label">Settings</span>
  </a>

  <button
    class="bottom-navigation__add-button"
    type="button"
    aria-label="Add expense"
    (click)="addExpensesSheetService.open()"
  >
    <span aria-hidden="true">+</span>
  </button>
</nav>
