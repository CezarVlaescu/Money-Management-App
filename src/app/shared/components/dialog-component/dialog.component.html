        <span class="primary-heading-3">
            {{dialogConfig().dialogHeaderTitle}}
        </span>
        <app-button [buttonConfig]="buttonConfig" />

</div>
<div class="dialog-content">
    <ng-content select="[dialog-content]" />
</div>
<div class="dialog-footer">
    <ng-content select="[dialog-footer]" />
</div>
